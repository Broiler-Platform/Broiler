name: Acid3 Pixel Test
on: [push, pull_request]
permissions:
  contents: read
jobs:
  acid3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install Pillow numpy
      - run: bash scripts/acid3-pixel-test.sh --skip-reference
      - name: Assert pixel-fidelity milestone (M0' ≥ 40%)
        run: |
          REPORT="acid/acid3/acid3-report.txt"
          if [ ! -f "$REPORT" ]; then
            echo "::error::Report not found at $REPORT"
            exit 1
          fi
          PCT=$(grep -oP 'Full-image match:.*\(\K[0-9]+\.[0-9]+' "$REPORT")
          if [ -z "$PCT" ]; then
            echo "::error::Could not parse Full-image match percentage from report"
            exit 1
          fi
          MIN=40
          echo "Full-image match: ${PCT}% (minimum required: ${MIN}%)"
          if python3 -c "exit(0 if float('${PCT}') >= ${MIN} else 1)"; then
            echo "✅ PASS: Pixel fidelity ${PCT}% meets the ${MIN}% milestone threshold"
          else
            echo "❌ FAIL: Pixel fidelity ${PCT}% is below the ${MIN}% milestone threshold"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: acid3-results
          path: |
            acid/acid3/acid3.png
            acid/acid3/acid3-diff.png
            acid/acid3/acid3-report.txt
