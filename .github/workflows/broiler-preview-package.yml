name: Prepare Broiler Preview Package

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to checkout recursively and package from.
        required: true
        default: main

permissions:
  contents: write

concurrency:
  group: broiler-preview-package-${{ github.event.inputs.branch }}
  cancel-in-progress: false

env:
  BROWSER_PROJECT_PATH: src/Broiler.App.Graphics/Broiler.App.Graphics.csproj
  WRITER_PROJECT_PATH: Broiler.Writer/Broiler.Writer.csproj
  CONFIGURATION: Release
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  build-windows-preview-package:
    name: Build BPP Win32 Packages
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore Windows runtime graphs
        shell: pwsh
        run: |
          dotnet restore $env:BROWSER_PROJECT_PATH --runtime win-x64
          dotnet restore $env:WRITER_PROJECT_PATH --runtime win-x64

      - name: Build Windows targets
        shell: pwsh
        run: |
          dotnet build $env:BROWSER_PROJECT_PATH `
            --framework net10.0-windows `
            --configuration $env:CONFIGURATION `
            --runtime win-x64 `
            --no-restore

          dotnet build $env:WRITER_PROJECT_PATH `
            --framework net10.0-windows `
            --configuration $env:CONFIGURATION `
            --runtime win-x64 `
            --no-restore

      - name: Publish Windows framework-dependent apps
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'packages\BPP-Win32-framework-dependent'

          dotnet publish $env:BROWSER_PROJECT_PATH `
            --framework net10.0-windows `
            --configuration $env:CONFIGURATION `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            --output $output `
            -p:UseAppHost=true

          dotnet publish $env:WRITER_PROJECT_PATH `
            --framework net10.0-windows `
            --configuration $env:CONFIGURATION `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            --output $output `
            -p:UseAppHost=true

      - name: Publish Windows self-contained apps
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'packages\BPP-Win32-self-contained'

          dotnet publish $env:BROWSER_PROJECT_PATH `
            --framework net10.0-windows `
            --configuration $env:CONFIGURATION `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output $output

          dotnet publish $env:WRITER_PROJECT_PATH `
            --framework net10.0-windows `
            --configuration $env:CONFIGURATION `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output $output

      - name: Package Windows assets
        shell: pwsh
        run: |
          function Rename-AppPublish {
            param(
              [Parameter(Mandatory=$true)][string]$Directory,
              [Parameter(Mandatory=$true)][string]$OriginalBaseName,
              [Parameter(Mandatory=$true)][string]$PackageBaseName,
              [Parameter(Mandatory=$true)][AllowEmptyString()][string]$ExecutableExtension
            )

            $originalExecutable = Join-Path $Directory ($OriginalBaseName + $ExecutableExtension)
            $packageExecutable = Join-Path $Directory ($PackageBaseName + $ExecutableExtension)
            if ($originalExecutable -ne $packageExecutable -and (Test-Path -LiteralPath $originalExecutable)) {
              Move-Item -LiteralPath $originalExecutable -Destination $packageExecutable -Force
            }

            if (-not (Test-Path -LiteralPath $packageExecutable)) {
              throw "Expected packaged executable was not produced: $packageExecutable"
            }
          }

          function New-WindowsArchive {
            param(
              [Parameter(Mandatory=$true)][string]$PackageParent,
              [Parameter(Mandatory=$true)][string]$PackageName,
              [Parameter(Mandatory=$true)][string]$AssetDirectory
            )

            $sevenZip = Get-Command 7z -ErrorAction SilentlyContinue
            if ($sevenZip -ne $null) {
              $destination = Join-Path $AssetDirectory "$PackageName.7z"
              Push-Location $PackageParent
              try {
                & $sevenZip.Source a -t7z $destination $PackageName
                if ($LASTEXITCODE -ne 0) {
                  throw "7z exited with code $LASTEXITCODE."
                }
              }
              finally {
                Pop-Location
              }

              return
            }

            Compress-Archive `
              -LiteralPath (Join-Path $PackageParent $PackageName) `
              -DestinationPath (Join-Path $AssetDirectory "$PackageName.zip") `
              -Force
          }

          $assetDir = Join-Path $env:RUNNER_TEMP 'release-assets'
          $packageParent = Join-Path $env:RUNNER_TEMP 'packages'
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          New-Item -ItemType Directory -Force -Path $packageParent | Out-Null

          foreach ($variant in @('framework-dependent', 'self-contained')) {
            $packageName = "BPP-Win32-$variant"
            $packageRoot = Join-Path $packageParent $packageName

            Rename-AppPublish `
              -Directory $packageRoot `
              -OriginalBaseName 'Broiler.Graphics.Browser' `
              -PackageBaseName 'Broiler.Browser' `
              -ExecutableExtension '.exe'

            Rename-AppPublish `
              -Directory $packageRoot `
              -OriginalBaseName 'Broiler.Writer' `
              -PackageBaseName 'Broiler.Writer' `
              -ExecutableExtension '.exe'

            New-WindowsArchive `
              -PackageParent $packageParent `
              -PackageName $packageName `
              -AssetDirectory $assetDir
          }

      - name: Upload Win32 framework-dependent BPP
        uses: actions/upload-artifact@v4
        with:
          name: BPP-Win32-framework-dependent
          path: ${{ runner.temp }}/release-assets/BPP-Win32-framework-dependent.*
          if-no-files-found: error

      - name: Upload Win32 self-contained BPP
        uses: actions/upload-artifact@v4
        with:
          name: BPP-Win32-self-contained
          path: ${{ runner.temp }}/release-assets/BPP-Win32-self-contained.*
          if-no-files-found: error

  build-linux-preview-package:
    name: Build BPP Linux Packages
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore Linux runtime graphs
        shell: pwsh
        run: |
          dotnet restore $env:BROWSER_PROJECT_PATH --runtime linux-x64
          dotnet restore $env:WRITER_PROJECT_PATH --runtime linux-x64

      - name: Build Linux targets
        shell: pwsh
        run: |
          dotnet build $env:BROWSER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --no-restore

          dotnet build $env:WRITER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --no-restore

      - name: Run Linux offscreen smoke tests
        shell: pwsh
        run: |
          dotnet run `
            --project $env:BROWSER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --no-build `
            -- `
            --offscreen `
            --duration-ms=1

          dotnet run `
            --project $env:WRITER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --no-build `
            -- `
            --offscreen `
            --duration-ms=1

      - name: Publish Linux framework-dependent apps
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'packages/BPP-Linux-framework-dependent'

          dotnet publish $env:BROWSER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --self-contained false `
            --no-restore `
            --output $output `
            -p:UseAppHost=true

          dotnet publish $env:WRITER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --self-contained false `
            --no-restore `
            --output $output `
            -p:UseAppHost=true

      - name: Publish Linux self-contained apps
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'packages/BPP-Linux-self-contained'

          dotnet publish $env:BROWSER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --self-contained true `
            --no-restore `
            --output $output

          dotnet publish $env:WRITER_PROJECT_PATH `
            --framework net10.0 `
            --configuration $env:CONFIGURATION `
            --runtime linux-x64 `
            --self-contained true `
            --no-restore `
            --output $output

      - name: Package Linux assets
        shell: pwsh
        run: |
          function Rename-AppPublish {
            param(
              [Parameter(Mandatory=$true)][string]$Directory,
              [Parameter(Mandatory=$true)][string]$OriginalBaseName,
              [Parameter(Mandatory=$true)][string]$PackageBaseName,
              [Parameter(Mandatory=$true)][AllowEmptyString()][string]$ExecutableExtension
            )

            $originalExecutable = Join-Path $Directory ($OriginalBaseName + $ExecutableExtension)
            $packageExecutable = Join-Path $Directory ($PackageBaseName + $ExecutableExtension)
            if ($originalExecutable -ne $packageExecutable -and (Test-Path -LiteralPath $originalExecutable)) {
              Move-Item -LiteralPath $originalExecutable -Destination $packageExecutable -Force
            }

            if (-not (Test-Path -LiteralPath $packageExecutable)) {
              throw "Expected packaged executable was not produced: $packageExecutable"
            }

            chmod +x $packageExecutable
          }

          function New-LinuxArchive {
            param(
              [Parameter(Mandatory=$true)][string]$PackageParent,
              [Parameter(Mandatory=$true)][string]$PackageName,
              [Parameter(Mandatory=$true)][string]$AssetDirectory
            )

            if (Get-Command xz -ErrorAction SilentlyContinue) {
              tar -cJf (Join-Path $AssetDirectory "$PackageName.tar.xz") -C $PackageParent $PackageName
              if ($LASTEXITCODE -ne 0) {
                throw "tar.xz packaging exited with code $LASTEXITCODE."
              }

              return
            }

            tar -czf (Join-Path $AssetDirectory "$PackageName.tar.gz") -C $PackageParent $PackageName
            if ($LASTEXITCODE -ne 0) {
              throw "tar.gz packaging exited with code $LASTEXITCODE."
            }
          }

          $assetDir = Join-Path $env:RUNNER_TEMP 'release-assets'
          $packageParent = Join-Path $env:RUNNER_TEMP 'packages'
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          New-Item -ItemType Directory -Force -Path $packageParent | Out-Null

          foreach ($variant in @('framework-dependent', 'self-contained')) {
            $packageName = "BPP-Linux-$variant"
            $packageRoot = Join-Path $packageParent $packageName

            Rename-AppPublish `
              -Directory $packageRoot `
              -OriginalBaseName 'Broiler.Graphics.Browser' `
              -PackageBaseName 'Broiler.Browser' `
              -ExecutableExtension ''

            Rename-AppPublish `
              -Directory $packageRoot `
              -OriginalBaseName 'Broiler.Writer' `
              -PackageBaseName 'Broiler.Writer' `
              -ExecutableExtension ''

            New-LinuxArchive `
              -PackageParent $packageParent `
              -PackageName $packageName `
              -AssetDirectory $assetDir
          }

      - name: Upload Linux framework-dependent BPP
        uses: actions/upload-artifact@v4
        with:
          name: BPP-Linux-framework-dependent
          path: ${{ runner.temp }}/release-assets/BPP-Linux-framework-dependent.tar.*
          if-no-files-found: error

      - name: Upload Linux self-contained BPP
        uses: actions/upload-artifact@v4
        with:
          name: BPP-Linux-self-contained
          path: ${{ runner.temp }}/release-assets/BPP-Linux-self-contained.tar.*
          if-no-files-found: error

  create-preview-package-release:
    name: Create BPP Draft Release
    runs-on: ubuntu-24.04
    needs:
      - build-windows-preview-package
      - build-linux-preview-package
    timeout-minutes: 30

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Download package assets
        uses: actions/download-artifact@v4
        with:
          pattern: BPP-*
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Resolve release metadata
        id: metadata
        shell: pwsh
        env:
          RELEASE_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          $branchSlug = $env:RELEASE_BRANCH -replace '[^A-Za-z0-9._-]+', '-'
          $branchSlug = $branchSlug.Trim('-')
          if ([string]::IsNullOrWhiteSpace($branchSlug)) {
            $branchSlug = 'branch'
          }

          $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $shortSha = (git rev-parse --short HEAD).Trim()
          $tagName = "broiler-preview-package-$branchSlug-$stamp-$env:GITHUB_RUN_NUMBER"
          $releaseTitle = "Broiler Preview Package draft ($env:RELEASE_BRANCH @ $shortSha)"

          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "release_title=$releaseTitle" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT

      - name: Create draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ github.event.inputs.branch }}
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.release_title }}
          SHORT_SHA: ${{ steps.metadata.outputs.short_sha }}
        run: |
          $assetDir = Join-Path $env:RUNNER_TEMP 'release-assets'

          function Resolve-Asset {
            param(
              [Parameter(Mandatory=$true)][string]$BaseName,
              [Parameter(Mandatory=$true)][string[]]$Extensions
            )

            foreach ($extension in $Extensions) {
              $candidate = Join-Path $assetDir ($BaseName + $extension)
              if (Test-Path -LiteralPath $candidate) {
                return $candidate
              }
            }

            throw "Missing expected BPP asset for $BaseName. Tried: $($Extensions -join ', ')"
          }

          $windowsFrameworkDependent = Resolve-Asset 'BPP-Win32-framework-dependent' @('.7z', '.zip')
          $windowsSelfContained = Resolve-Asset 'BPP-Win32-self-contained' @('.7z', '.zip')
          $linuxFrameworkDependent = Resolve-Asset 'BPP-Linux-framework-dependent' @('.tar.xz', '.tar.gz')
          $linuxSelfContained = Resolve-Asset 'BPP-Linux-self-contained' @('.tar.xz', '.tar.gz')

          foreach ($asset in @($windowsFrameworkDependent, $windowsSelfContained, $linuxFrameworkDependent, $linuxSelfContained)) {
            if (-not (Test-Path -LiteralPath $asset)) {
              throw "Missing expected BPP asset: $asset"
            }
          }

          $assetList = @(
            $windowsFrameworkDependent,
            $windowsSelfContained,
            $linuxFrameworkDependent,
            $linuxSelfContained
          ) | ForEach-Object { "- " + (Split-Path -Leaf $_) }

          $body = @"
          Draft Broiler Preview Package prepared from branch $env:RELEASE_BRANCH at commit $env:SHORT_SHA.

          Each package contains Broiler.Browser and Broiler.Writer.

          Assets:
          $($assetList -join "`n")
          "@

          $bodyPath = Join-Path $env:RUNNER_TEMP 'broiler-preview-package-notes.md'
          Set-Content -LiteralPath $bodyPath -Value $body -Encoding UTF8

          gh release create $env:TAG_NAME `
            $windowsFrameworkDependent `
            $windowsSelfContained `
            $linuxFrameworkDependent `
            $linuxSelfContained `
            --draft `
            --target $env:RELEASE_BRANCH `
            --title $env:RELEASE_TITLE `
            --notes-file $bodyPath
