name: Browser WebAssembly Phase 1 Proof

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/browser-wasm-phase1.yml'
      - 'Broiler.Graphics/**'
      - 'Broiler.Media/**'
      - 'Broiler.UI/samples/WebAssembly/**'
      - 'tests/browser-wasm-phase1/**'
      - 'docs/roadmap/browser-webassembly-graphics-ui-roadmap.md'
      - 'docs/roadmap/browser-webassembly-phase1/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/browser-wasm-phase1.yml'
      - 'Broiler.Graphics/**'
      - 'Broiler.Media/**'
      - 'Broiler.UI/samples/WebAssembly/**'
      - 'tests/browser-wasm-phase1/**'
      - 'docs/roadmap/browser-webassembly-graphics-ui-roadmap.md'
      - 'docs/roadmap/browser-webassembly-phase1/**'

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DEMO_PROJECT: Broiler.UI/samples/WebAssembly/Broiler.UI.WebAssembly.Demo/Broiler.UI.WebAssembly.Demo.csproj

jobs:
  phase1:
    name: Publish and execute Graphics proof
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/browser-wasm-phase1/package-lock.json

      - name: Install WebAssembly and browser test dependencies
        run: |
          dotnet workload install wasm-tools
          npm ci --prefix tests/browser-wasm-phase1
          npm exec --prefix tests/browser-wasm-phase1 -- playwright install --with-deps chromium firefox

      - name: Build Phase 1 browser application
        run: dotnet build "$DEMO_PROJECT" --configuration Release

      - name: Publish interpreted, trimmed, and AOT modes
        run: |
          dotnet publish "$DEMO_PROJECT" --configuration Release \
            -p:PublishTrimmed=false -p:RunAOTCompilation=false \
            --output "$RUNNER_TEMP/phase1/interpreted"
          dotnet publish "$DEMO_PROJECT" --configuration Release \
            -p:PublishTrimmed=true -p:RunAOTCompilation=false \
            --output "$RUNNER_TEMP/phase1/trimmed"
          dotnet publish "$DEMO_PROJECT" --configuration Release \
            -p:PublishTrimmed=true -p:RunAOTCompilation=true \
            --output "$RUNNER_TEMP/phase1/aot"

      - name: Reject platform-specific Broiler assets and record payloads
        shell: bash
        run: |
          report="$RUNNER_TEMP/phase1/payloads.txt"
          for mode in interpreted trimmed aot; do
            output="$RUNNER_TEMP/phase1/$mode/wwwroot"
            test -d "$output"
            if find "$output" -type f -printf '%f\n' | grep -E 'Broiler.*(\.Windows|\.Linux|Direct2D|OpenGL|Vulkan)'; then
              echo "Platform-specific Broiler asset found in $mode publish." >&2
              exit 1
            fi
            total_bytes=$(find "$output" -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
            brotli_bytes=$(find "$output" -type f -name '*.br' -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
            echo "$mode wwwroot_bytes=$total_bytes brotli_bytes=$brotli_bytes" | tee -a "$report"
          done

      - name: Execute trimmed proof in Chromium and Firefox
        shell: bash
        env:
          BROILER_PHASE1_URL: http://127.0.0.1:8766/
          BROILER_PHASE1_EVIDENCE: artifacts/browser-wasm-phase1/browser-evidence
        run: |
          python3 -m http.server 8766 --bind 127.0.0.1 \
            --directory "$RUNNER_TEMP/phase1/trimmed/wwwroot" &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          npm --prefix tests/browser-wasm-phase1 run smoke

      - name: Upload Phase 1 evidence
        uses: actions/upload-artifact@v6
        with:
          name: broiler-wasm-phase1-evidence
          path: |
            artifacts/browser-wasm-phase1/browser-evidence
            ${{ runner.temp }}/phase1/payloads.txt
          if-no-files-found: error
