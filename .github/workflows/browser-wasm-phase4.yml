name: Browser WebAssembly Phase 4 Text and Accessibility

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/browser-wasm-phase4.yml'
      - 'Broiler.Graphics/**'
      - 'Broiler.Input/**'
      - 'Broiler.UI/samples/WebAssembly/**'
      - 'Broiler.UI/src/**'
      - 'tests/browser-wasm-phase4/**'
      - 'docs/roadmap/browser-webassembly-graphics-ui-roadmap.md'
      - 'docs/roadmap/browser-webassembly-phase4/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/browser-wasm-phase4.yml'
      - 'Broiler.Graphics/**'
      - 'Broiler.Input/**'
      - 'Broiler.UI/samples/WebAssembly/**'
      - 'Broiler.UI/src/**'
      - 'tests/browser-wasm-phase4/**'
      - 'docs/roadmap/browser-webassembly-graphics-ui-roadmap.md'
      - 'docs/roadmap/browser-webassembly-phase4/**'

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DEMO_PROJECT: Broiler.UI/samples/WebAssembly/Broiler.UI.WebAssembly.Demo/Broiler.UI.WebAssembly.Demo.csproj

jobs:
  phase4:
    name: Execute text, clipboard, and semantic baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/browser-wasm-phase4/package-lock.json

      - name: Install WebAssembly and browser test dependencies
        run: |
          dotnet workload install wasm-tools
          npm ci --prefix tests/browser-wasm-phase4
          npm exec --prefix tests/browser-wasm-phase4 -- playwright install --with-deps chromium firefox

      - name: Build Phase 4 host
        run: dotnet build "$DEMO_PROJECT" --configuration Release

      - name: Publish trimmed and AOT modes
        run: |
          dotnet publish "$DEMO_PROJECT" --configuration Release \
            -p:PublishTrimmed=true -p:RunAOTCompilation=false \
            --output "$RUNNER_TEMP/phase4/trimmed"
          dotnet publish "$DEMO_PROJECT" --configuration Release \
            -p:PublishTrimmed=true -p:RunAOTCompilation=true \
            --output "$RUNNER_TEMP/phase4/aot"

      - name: Reject platform-specific Broiler assets
        shell: bash
        run: |
          report="$RUNNER_TEMP/phase4/payloads.txt"
          for mode in trimmed aot; do
            output="$RUNNER_TEMP/phase4/$mode/wwwroot"
            test -d "$output"
            if find "$output" -type f -printf '%f\n' | grep -E 'Broiler.*(\.Windows|\.Linux|Direct2D|OpenGL|Vulkan)'; then
              echo "Platform-specific Broiler asset found in $mode publish." >&2
              exit 1
            fi
            total_bytes=$(find "$output" -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
            echo "$mode wwwroot_bytes=$total_bytes" | tee -a "$report"
          done

      - name: Execute AOT text and semantic host in Chromium and Firefox
        shell: bash
        env:
          BROILER_PHASE4_URL: http://127.0.0.1:8769/
          BROILER_PHASE4_EVIDENCE: artifacts/browser-wasm-phase4/browser-evidence
        run: |
          python3 -m http.server 8769 --bind 127.0.0.1 \
            --directory "$RUNNER_TEMP/phase4/aot/wwwroot" &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          npm --prefix tests/browser-wasm-phase4 run smoke

      - name: Upload Phase 4 evidence
        uses: actions/upload-artifact@v6
        with:
          name: broiler-wasm-phase4-evidence
          path: |
            artifacts/browser-wasm-phase4/browser-evidence
            ${{ runner.temp }}/phase4/payloads.txt
          if-no-files-found: error
