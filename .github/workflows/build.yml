name: Build & Test

# Phase 0 build-and-test gate for the public-preview roadmap.
# Runs on every push to main and every pull request, plus on demand.
#
# Runs on windows-latest by design: Broiler.App (net10.0-windows, WPF today)
# and Broiler.Graphics.Windows (Direct2D) are Windows-only, and the shipped
# preview targets the Broiler-owned Win32/Direct2D stack — no external UI
# dependency. See docs/roadmap/public-preview-roadmap.md.

on:
  workflow_dispatch:
  
permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Nested submodules are required: without them the Broiler.JS build
          # breaks on the Regex alias. See the broiler-js-nested-submodules note.
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          # The solution mixes net8.0 libraries with net10.0-windows apps.
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Broiler.slnx

      - name: Build (Release)
        run: dotnet build Broiler.slnx --configuration Release --no-restore --nologo

      - name: Test (Release)
        run: >-
          dotnet test Broiler.slnx --configuration Release --no-build --nologo
          --logger "trx;LogFileName=build-test.trx"
          --results-directory ${{ github.workspace }}/TestResults

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-test-results
          path: ${{ github.workspace }}/TestResults/
