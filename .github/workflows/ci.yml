name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Broiler.slnx

      - name: Build
        run: dotnet build Broiler.slnx --no-restore --verbosity normal

      - name: Run YantraJS tests
        run: dotnet test yantra-1.2.295/YantraJS.Core.Tests --no-build --verbosity normal
