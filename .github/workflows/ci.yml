name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test Core
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Core.Tests/ --no-build --verbosity normal

    - name: Test Ast
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Ast.Tests/ --no-build --verbosity normal

    - name: Test Parser
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Parser.Tests/ --no-build --verbosity normal

    - name: Test Storage
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Storage.Tests/ --no-build --verbosity normal

    - name: Test Debugger
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Debugger.Tests/ --no-build --verbosity normal

    - name: Test Clr
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Clr.Tests/ --no-build --verbosity normal

    - name: Test Compiler
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Compiler.Tests/ --no-build --verbosity normal

    - name: Test Modules
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Modules.Tests/ --no-build --verbosity normal

    - name: Test BuiltIns
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.BuiltIns.Tests/ --no-build --verbosity normal

    - name: Test Runtime
      run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Runtime.Tests/ --no-build --verbosity normal
