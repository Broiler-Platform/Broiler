name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Broiler.JavaScript/Broiler.JavaScript.Core.Tests/Broiler.JavaScript.Core.Tests.csproj

      - name: Build
        run: dotnet build Broiler.JavaScript/Broiler.JavaScript.Core.Tests/Broiler.JavaScript.Core.Tests.csproj --no-restore

      - name: Test - Core
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Core.Tests/ --no-build --verbosity normal

      - name: Test - Ast
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Ast.Tests/ --verbosity normal

      - name: Test - Parser
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Parser.Tests/ --verbosity normal

      - name: Test - Storage
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Storage.Tests/ --verbosity normal

      - name: Test - Debugger
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Debugger.Tests/ --verbosity normal

      - name: Test - Clr
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Clr.Tests/ --verbosity normal

      - name: Test - Compiler
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Compiler.Tests/ --verbosity normal

      - name: Test - Modules
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.Modules.Tests/ --verbosity normal

      - name: Test - BuiltIns
        run: dotnet test Broiler.JavaScript/Broiler.JavaScript.BuiltIns.Tests/ --verbosity normal
