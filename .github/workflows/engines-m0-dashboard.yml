name: Engines M0 Dashboard

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test262-subset:
    name: Test262 subset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run Test262 subset baseline
        run: >-
          dotnet run --project src/Broiler.Engines.Baseline --configuration Release -- test262
          --baseline tests/m0-baseline/conformance/test262-subset/test262-subset-results.json
          --output-dir tests/m0-baseline/ci/test262
      - name: Publish Test262 summary
        if: always()
        run: cat tests/m0-baseline/ci/test262/test262-subset-summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test262-subset
          path: tests/m0-baseline/ci/test262/

  test262-es2025:
    name: Test262 ES2025 subset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run Test262 ES2025 subset gate
        run: >-
          dotnet run --project src/Broiler.Engines.Baseline --configuration Release -- test262
          --manifest tests/m2-conformance/test262-es2025-manifest.json
          --output-dir tests/m2-conformance/ci/test262-es2025
          --minimum-pass-rate 100
      - name: Publish Test262 ES2025 summary
        if: always()
        run: cat tests/m2-conformance/ci/test262-es2025/test262-subset-summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test262-es2025
          path: tests/m2-conformance/ci/test262-es2025/

  wpt-suites:
    name: WPT relevant suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run WPT-derived CLI suites
        run: >-
          dotnet test src/Broiler.Cli.Tests/Broiler.Cli.Tests.csproj --configuration Release --nologo
          --filter "FullyQualifiedName~Broiler.Cli.Tests.WptCssVariablesTests|FullyQualifiedName~Broiler.Cli.Tests.WptFontAndSelectorTests"
          --logger "trx;LogFileName=wpt-relevant-suites.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wpt-relevant-suites
          path: src/Broiler.Cli.Tests/TestResults/

  html-css-targeted:
    name: HTML/CSS targeted conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run HTML/CSS targeted suite
        run: >-
          dotnet test src/Broiler.Cli.Tests/Broiler.Cli.Tests.csproj --configuration Release --nologo
          --filter "FullyQualifiedName~Broiler.Cli.Tests.WptCssVariablesTests|FullyQualifiedName~Broiler.Cli.Tests.WptFontAndSelectorTests|FullyQualifiedName~GoogleSearchComplianceTests|FullyQualifiedName~Acid3HtmlElementRegressionTests|FullyQualifiedName~Acid3SpecialRegressionTests|FullyQualifiedName~Acid3CssSelectorRegressionTests|FullyQualifiedName~SelectorsLevel4SpecificityTests"
          --logger "trx;LogFileName=html-css-targeted.trx"
      - name: Build HTML/CSS summary
        if: always()
        run: |
          mkdir -p tests/m2-conformance/ci/html-css-targeted
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          import xml.etree.ElementTree as ET

          trx_files = list(Path("src/Broiler.Cli.Tests/TestResults").rglob("html-css-targeted.trx"))
          if not trx_files:
              raise SystemExit("Could not find html-css-targeted.trx")

          root = ET.parse(trx_files[0]).getroot()
          ns = {"trx": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
          counters = root.find(".//trx:Counters", ns)
          if counters is None:
              raise SystemExit("Could not find TRX counters")

          total = int(counters.attrib.get("total", "0"))
          executed = int(counters.attrib.get("executed", "0"))
          passed = int(counters.attrib.get("passed", "0"))
          failed = int(counters.attrib.get("failed", "0"))
          not_executed = int(counters.attrib.get("notExecuted", "0"))
          pass_rate = (passed / executed * 100.0) if executed else 0.0

          summary = textwrap.dedent(f"""
          ## HTML/CSS targeted conformance

          | Metric | Value |
          |---|---:|
          | Total tests | {total} |
          | Executed | {executed} |
          | Passed | {passed} |
          | Failed | {failed} |
          | Skipped / not executed | {not_executed} |
          | Pass rate | {pass_rate:.1f}% |

          This summary is generated from the focused Milestone 2 / W4 suite:

          - `Broiler.Cli.Tests.WptCssVariablesTests`
          - `Broiler.Cli.Tests.WptFontAndSelectorTests`
          - `Broiler.Cli.Tests.GoogleSearchComplianceTests`
          - `Broiler.Cli.Tests.Acid3HtmlElementRegressionTests`
          - `Broiler.Cli.Tests.Acid3SpecialRegressionTests`
          - `Broiler.Cli.Tests.Acid3CssSelectorRegressionTests`
          - `Broiler.Cli.Tests.SelectorsLevel4SpecificityTests`
          """).strip() + "\n"

          Path("tests/m2-conformance/ci/html-css-targeted/html-css-targeted-summary.md").write_text(summary)
          PY
      - name: Publish HTML/CSS summary
        if: always()
        run: cat tests/m2-conformance/ci/html-css-targeted/html-css-targeted-summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-css-targeted
          path: |
            tests/m2-conformance/ci/html-css-targeted/
            src/Broiler.Cli.Tests/TestResults/

  bridge-targeted:
    name: Bridge DOM/Web targeted conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run Bridge DOM/Web targeted suite
        run: >-
          dotnet test src/Broiler.Cli.Tests/Broiler.Cli.Tests.csproj --configuration Release --nologo
          --filter "FullyQualifiedName~DomEventsTests|FullyQualifiedName~DomEventsEdgeCaseTests|FullyQualifiedName~SelectorsAndCssomTests|FullyQualifiedName~TimerAndAsyncTests|FullyQualifiedName~ScriptEngine_Execute_Runs_Microtasks_Between_Sequential_Scripts|FullyQualifiedName~ScriptEngine_Execute_Runs_Microtasks_Between_Deferred_Scripts|FullyQualifiedName~InteractiveSession_Step_Runs_Microtasks_Between_Timer_Tasks"
          --logger "trx;LogFileName=bridge-targeted.trx"
      - name: Build Bridge summary
        if: always()
        run: |
          mkdir -p tests/m2-conformance/ci/bridge-targeted
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          import xml.etree.ElementTree as ET

          trx_files = list(Path("src/Broiler.Cli.Tests/TestResults").rglob("bridge-targeted.trx"))
          if not trx_files:
              raise SystemExit("Could not find bridge-targeted.trx")

          root = ET.parse(trx_files[0]).getroot()
          ns = {"trx": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
          counters = root.find(".//trx:Counters", ns)
          if counters is None:
              raise SystemExit("Could not find TRX counters")

          total = int(counters.attrib.get("total", "0"))
          executed = int(counters.attrib.get("executed", "0"))
          passed = int(counters.attrib.get("passed", "0"))
          failed = int(counters.attrib.get("failed", "0"))
          not_executed = int(counters.attrib.get("notExecuted", "0"))
          pass_rate = (passed / executed * 100.0) if executed else 0.0

          summary = textwrap.dedent(f"""
          ## Bridge DOM/Web targeted conformance

          | Metric | Value |
          |---|---:|
          | Total tests | {total} |
          | Executed | {executed} |
          | Passed | {passed} |
          | Failed | {failed} |
          | Skipped / not executed | {not_executed} |
          | Pass rate | {pass_rate:.1f}% |

          This summary is generated from the focused Milestone 2 / W5 Bridge suite:

          - `Broiler.Cli.Tests.DomEventsTests`
          - `Broiler.Cli.Tests.DomEventsEdgeCaseTests`
          - `Broiler.Cli.Tests.SelectorsAndCssomTests`
          - `Broiler.Cli.Tests.TimerAndAsyncTests`
          - `ScriptEngine_Execute_Runs_Microtasks_Between_Sequential_Scripts`
          - `ScriptEngine_Execute_Runs_Microtasks_Between_Deferred_Scripts`
          - `InteractiveSession_Step_Runs_Microtasks_Between_Timer_Tasks`
          """).strip() + "\n"

          Path("tests/m2-conformance/ci/bridge-targeted/bridge-targeted-summary.md").write_text(summary)
          PY
      - name: Publish Bridge summary
        if: always()
        run: cat tests/m2-conformance/ci/bridge-targeted/bridge-targeted-summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bridge-targeted
          path: |
            tests/m2-conformance/ci/bridge-targeted/
            src/Broiler.Cli.Tests/TestResults/

  acid3:
    name: Acid3 regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run Acid3 regression tests
        run: >-
          dotnet test src/Broiler.Cli.Tests/Broiler.Cli.Tests.csproj --configuration Release --nologo
          --filter "FullyQualifiedName~Acid3RegressionTests"
          --logger "trx;LogFileName=acid3-regression.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: acid3-regression
          path: src/Broiler.Cli.Tests/TestResults/

  benchmarks:
    name: Engine baseline benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run engine baseline benchmarks
        run: >-
          dotnet run --project src/Broiler.Engines.Baseline --configuration Release -- benchmarks
          --output-dir tests/m0-baseline/ci/benchmarks
          --baseline tests/m0-baseline/performance/engine-benchmark-baseline.json
          --budget-percent 2
      - name: Publish benchmark summary
        if: always()
        run: cat tests/m0-baseline/ci/benchmarks/engine-benchmark-baseline.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-baseline-benchmarks
          path: tests/m0-baseline/ci/benchmarks/

  dashboard:
    name: Unified dashboard summary
    if: always()
    needs:
      - test262-subset
      - test262-es2025
      - wpt-suites
      - html-css-targeted
      - bridge-targeted
      - acid3
      - benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts
      - name: Build workflow summary
        run: |
          echo "# Engines M0 dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Signal | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test262 subset | ${{ needs.test262-subset.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test262 ES2025 subset | ${{ needs.test262-es2025.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WPT relevant suites | ${{ needs.wpt-suites.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HTML/CSS targeted conformance | ${{ needs.html-css-targeted.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bridge DOM/Web targeted conformance | ${{ needs.bridge-targeted.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Acid3 regression | ${{ needs.acid3.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Benchmarks | ${{ needs.benchmarks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/test262-subset/test262-subset-summary.md ]; then
            cat artifacts/test262-subset/test262-subset-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/test262-es2025/test262-subset-summary.md ]; then
            cat artifacts/test262-es2025/test262-subset-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/html-css-targeted/html-css-targeted-summary.md ]; then
            cat artifacts/html-css-targeted/html-css-targeted-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/bridge-targeted/bridge-targeted-summary.md ]; then
            cat artifacts/bridge-targeted/bridge-targeted-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/engine-baseline-benchmarks/engine-benchmark-baseline.md ]; then
            cat artifacts/engine-baseline-benchmarks/engine-benchmark-baseline.md >> "$GITHUB_STEP_SUMMARY"
          fi
