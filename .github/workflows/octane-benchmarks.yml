name: Octane Benchmarks

# Runs Google's Octane 2.0 JavaScript benchmark suite (https://github.com/chromium/octane)
# under two engines and commits the comparison back to the repository:
#
#   * Chromium  — real V8 in a headless browser, driven by Playwright.
#   * Broiler   — the BroilerJS `--script-host` shell (the Broiler.JS engine).
#
# Each Octane suite runs in isolation (a fresh Chromium page / a fresh Broiler
# process) so a crash, hang, or error in one suite never discards the others —
# Broiler is experimental and some suites do not yet complete. Results and a
# Chromium-vs-Broiler comparison are written to tests/octane/results and, on the
# default branch, committed.

on:
  workflow_dispatch:
    inputs:
      engines:
        description: Comma-separated engines to run (chromium,broiler).
        required: false
        default: 'chromium,broiler'
      timeout_seconds:
        description: Per-suite timeout in seconds.
        required: false
        default: '180'
      octane_ref:
        description: Git ref of chromium/octane to benchmark.
        required: false
        default: 'master'
      commit_results:
        description: Commit the refreshed results back to the branch.
        type: boolean
        required: false
        default: true

permissions:
  contents: write   # commit the refreshed Octane results

concurrency:
  group: octane-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Octane (Chromium vs Broiler)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          # Nested submodules are required: without them the Broiler.JS build
          # breaks on the Regex alias. See the broiler-js-nested-submodules note.
          submodules: recursive
          ref: ${{ github.ref_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Octane benchmarks
        run: |
          bash scripts/run-octane-benchmarks.sh \
            --engines "${{ github.event.inputs.engines || 'chromium,broiler' }}" \
            --timeout "${{ github.event.inputs.timeout_seconds || '180' }}" \
            --octane-ref "${{ github.event.inputs.octane_ref || 'master' }}"

      - name: Publish comparison to job summary
        if: always()
        run: |
          if [ -f tests/octane/results/comparison.md ]; then
            cat tests/octane/results/comparison.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: octane-results
          path: tests/octane/results/

      - name: Commit results
        if: ${{ github.event.inputs.commit_results != 'false' }}
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/octane/results/
          if git diff --quiet --cached; then
            echo "No result changes to commit."
            exit 0
          fi
          git commit -m "ci: update Octane benchmark results [skip ci]"
          git push origin "HEAD:$BRANCH_NAME"
