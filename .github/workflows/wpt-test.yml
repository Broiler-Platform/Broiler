name: WPT Testsuite — Broiler CLI vs Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:           # allow manual runs

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  wpt-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── .NET SDK ─────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Node.js ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install Node dependencies & Playwright browser ───────────────
      - name: Install Node dependencies
        working-directory: tests/wpt
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tests/wpt
        run: npx playwright install --with-deps chromium

      # ── Build Broiler CLI ────────────────────────────────────────────
      - name: Build Broiler CLI
        run: dotnet build src/Broiler.Cli/Broiler.Cli.csproj --configuration Release

      # ── Run Playwright reference captures ────────────────────────────
      - name: Run Playwright captures
        working-directory: tests/wpt
        run: node run-playwright.js --timeout 30000

      # ── Run Broiler CLI captures ─────────────────────────────────────
      - name: Run Broiler CLI captures
        working-directory: tests/wpt
        run: bash run-broiler-cli.sh --timeout 30
        continue-on-error: true     # CLI may fail on some tests

      # ── Compare & generate report ────────────────────────────────────
      - name: Compare outputs
        working-directory: tests/wpt
        run: node compare.js

      # ── Upload report as artifact ────────────────────────────────────
      - name: Upload WPT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-report
          path: |
            tests/wpt/results/wpt-report.md
            tests/wpt/results/wpt-report.json
          retention-days: 30

      # ── Print report summary ─────────────────────────────────────────
      - name: Print report summary
        if: always()
        working-directory: tests/wpt
        run: |
          echo "## WPT Report Summary" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f results/wpt-report.md ]]; then
            cat results/wpt-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Report not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
