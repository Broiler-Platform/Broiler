name: YantraJS CI

on:
  push:
    branches: [ main ]
    paths:
      - 'yantra-1.2.295/**'
      - '.github/workflows/yantrajs-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'yantra-1.2.295/**'
      - '.github/workflows/yantrajs-ci.yml'

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore yantra-1.2.295/YantraJS.Core.Tests/YantraJS.Core.Tests.csproj

    - name: Build
      run: dotnet build yantra-1.2.295/YantraJS.Core.Tests/YantraJS.Core.Tests.csproj --no-restore

    - name: Test
      run: dotnet test yantra-1.2.295/YantraJS.Core.Tests/YantraJS.Core.Tests.csproj --no-build --verbosity normal
