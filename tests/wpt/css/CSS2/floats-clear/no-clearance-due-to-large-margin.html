<!DOCTYPE html>
<html>
<head>
  <title>CSS2: No clearance due to large margin</title>
  <style>
    html, body { margin: 0; padding: 0; }
    .float {
      float: left;
      width: 100px;
      height: 50px;
      background: blue;
    }
    .clear {
      clear: left;
      margin-top: 200px;
      width: 200px;
      height: 50px;
      background: green;
    }
  </style>
</head>
<body>
  <!-- CSS2.1 §9.5.2: When the hypothetical position of the cleared
       element is already below all relevant floats due to a large
       margin-top, no clearance is needed and the margin is preserved.
       The green box has margin-top:200px which already clears the
       50px-tall float, so it should be at y=200. -->
  <div class="float"></div>
  <div class="clear"></div>
</body>
</html>
