<!DOCTYPE html>
<html>
<head>
  <title>CSS2: Inline SVG 100% width/height in body</title>
  <style>
    html, body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"
       viewBox="0 0 200 200">
    <rect x="10" y="10" width="180" height="180" fill="green"/>
  </svg>
</body>
</html>
