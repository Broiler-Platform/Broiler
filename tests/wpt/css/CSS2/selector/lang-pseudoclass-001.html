<!DOCTYPE html>
<html lang="en">
<head>
  <title>CSS2: :lang() pseudo-class</title>
  <style>
    html, body { margin: 0; padding: 0; }
    .box { width: 200px; height: 100px; background: white; }
    .box:lang(en) {
      background: green;
    }
    .box:lang(fr) {
      background: red;
    }
  </style>
</head>
<body>
  <!-- CSS2.1 §5.11.4: :lang(en) should match because the html element
       has lang="en".  The box should have a green background.
       :lang(fr) should NOT match.  Uses a div with fixed dimensions
       to avoid font-rendering differences. -->
  <div class="box"></div>
</body>
</html>
