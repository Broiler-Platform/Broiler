<!DOCTYPE html>
<html>
<head>
  <title>CSS2: min-height on block element (40px)</title>
  <style>
    html, body { margin: 0; padding: 0; }
    .box {
      width: 100px;
      height: 10px;
      min-height: 40px;
      background: green;
    }
  </style>
</head>
<body>
  <!-- min-height: 40px should override the explicit height: 10px,
       making the box 40px tall. -->
  <div class="box"></div>
</body>
</html>
