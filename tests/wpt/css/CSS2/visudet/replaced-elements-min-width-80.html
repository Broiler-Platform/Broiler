<!DOCTYPE html>
<html>
<head>
  <title>CSS2: min-width on block element (80px)</title>
  <style>
    html, body { margin: 0; padding: 0; }
    .box {
      width: 20px;
      min-width: 80px;
      height: 50px;
      background: green;
    }
  </style>
</head>
<body>
  <!-- min-width: 80px should override the explicit width: 20px,
       making the box 80px wide. -->
  <div class="box"></div>
</body>
</html>
