<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Anchor Positioning Test: position-visibility: anchors-visible with relpos scroller</title>
<link rel="help" href="https://drafts.csswg.org/css-anchor-position-1/#position-visibility">
<link rel="match" href="reference/position-visibility-anchors-visible-with-position-ref.html">
<style>
  #scroll-container {
    overflow: hidden scroll;
    width: 300px;
    height: 100px;
    position: relative;
  }

  #anchor {
    anchor-name: --a1;
    width: 100px;
    height: 100px;
    background: orange;
  }

  #spacer {
    height: 100px;
  }

  #target {
    position-anchor: --a1;
    position-visibility: anchors-visible;
    position-area: bottom right;
    width: 100px;
    height: 100px;
    background: green;
    position: absolute;
    inset: 0;
  }
</style>

<div id="scroll-container">
  <div id="anchor">anchor</div>
  <div id="spacer"></div>
  <div id="target">target</div>
</div>

<script>
  const scroller = document.getElementById('scroll-container');
  scroller.scrollTop = 100;
</script>
