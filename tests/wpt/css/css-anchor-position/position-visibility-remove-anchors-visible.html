<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Anchor Positioning Test: removing position-visibility: anchors-visible</title>
<link rel="help" href="https://drafts.csswg.org/css-anchor-position-1/#position-visibility">
<link rel="match" href="reference/position-visibility-remove-anchors-visible-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
<style>
  #scroll-container {
    overflow: hidden scroll;
    width: 300px;
    height: 100px;
    font: 20px/1 Ahem;
  }

  #anchor {
    anchor-name: --a1;
    width: 100px;
    height: 100px;
    background: orange;
    font: 20px/1 Ahem;
  }

  #spacer {
    height: 100px;
  }

  #target {
    position-anchor: --a1;
    position-visibility: anchors-visible;
    position-area: bottom;
    width: 100px;
    height: 100px;
    background: green;
    position: absolute;
    inset: 0;
    font: 20px/1 Ahem;
  }
</style>

<div id="scroll-container">
  <div id="anchor">anchor</div>
  <div id="spacer"></div>
  <div id="target">target</div>
</div>

<script>
  const scroller = document.getElementById('scroll-container');
  scroller.scrollTop = 100;

  // Remove position-visibility: anchors-visible. #target should become visible.
  document.getElementById('target').style.positionVisibility = 'always';
</script>
